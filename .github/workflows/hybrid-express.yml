name: Deploy Express (Hybrid)

on:
  push:
    branches:
      - develop

permissions:
  id-token: write
  contents: read

jobs:
  trigger:
    uses: ./.github/workflows/_trigger-pipeline.yml
    with:
      prefix: hy-express
      express: true
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
